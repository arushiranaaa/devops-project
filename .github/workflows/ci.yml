name: Java CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    # This section gives the robot permission to upload the image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile and Run Java
        run: |
          javac HelloDevOps.java
          java HelloDevOps

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          # Building the image with your username arushiranaaa
          docker build -t ghcr.io/arushiranaaa/my-java-app:latest .
          # Pushing the image to your GitHub account
          docker push ghcr.io/arushiranaaa/my-java-app:latest
