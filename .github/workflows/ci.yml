name: Java CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Code
        run: javac HelloDevOps.java TestHello.java

      - name: Run Unit Tests
        run: java TestHello # If this fails, the pipeline stops here!

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t ghcr.io/arushiranaaa/my-java-app:latest .
          docker push ghcr.io/arushiranaaa/my-java-app:latest
